<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VibeBooth Login — AI Modern Photobooth</title>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- GSAP Animations -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>

    <!-- Font: Outfit (Modern AI Startup Look) -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;700;900&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="style.css">

    <style>
        body {
            font-family: 'Outfit', sans-serif;
            background-color: #050505;
            color: white;
            overflow-x: hidden;
        }

        /* --- Glassmorphism Utilities --- */
        .glass {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.1);
        }

        /* --- Neon Glows --- */
        .glow-text {
            text-shadow: 0 0 20px rgba(168, 85, 247, 0.6);
        }
        
        .btn-glow {
            transition: all 0.3s ease;
            box-shadow: 0 0 0 rgba(236, 72, 153, 0);
        }
        .btn-glow:hover {
            box-shadow: 0 0 20px rgba(236, 72, 153, 0.6);
            transform: translateY(-2px);
        }

        /* --- Floating Particles Background --- */
        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            overflow: hidden;
            pointer-events: none;
        }
        .particle {
            position: absolute;
            border-radius: 50%;
            background: rgba(168, 85, 247, 0.4);
            animation: floatUp linear infinite;
        }

        @keyframes floatUp {
            0% { transform: translateY(100vh) scale(0); opacity: 0; }
            50% { opacity: 1; }
            100% { transform: translateY(-10vh) scale(1); opacity: 0; }
        }

        /* --- Auth Card --- */
        .auth-card {
            width: min(520px, 100%);
            background: rgba(10, 10, 15, 0.95);
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: 28px;
            box-shadow: 0 30px 90px rgba(0, 0, 0, 0.45);
            padding: 36px;
            position: relative;
        }
        .auth-card h2 {
            font-size: 2rem;
            margin-bottom: 0.5rem;
        }
        .auth-card p {
            color: #c1c1d1;
        }
        .auth-input {
            width: 100%;
            padding: 14px 16px;
            border-radius: 18px;
            border: 1px solid rgba(255, 255, 255, 0.12);
            background: rgba(255, 255, 255, 0.05);
            color: white;
            margin-top: 12px;
            outline: none;
        }
        .auth-input::placeholder {
            color: #888;
        }
        .auth-cta {
            width: 100%;
            padding: 16px 18px;
            border-radius: 999px;
            border: none;
            background: linear-gradient(135deg, #9333ea, #ec4899);
            color: white;
            font-weight: 700;
            cursor: pointer;
            margin-top: 20px;
            transition: transform 0.2s ease;
        }
        .auth-cta:hover {
            transform: translateY(-1px);
        }
        .auth-close {
            position: absolute;
            top: 18px;
            right: 18px;
            background: rgba(255, 255, 255, 0.08);
            border: none;
            width: 38px;
            height: 38px;
            border-radius: 50%;
            color: #fff;
            cursor: pointer;
            transition: background 0.2s ease;
        }
        .auth-close:hover {
            background: rgba(255, 255, 255, 0.12);
        }

        .back-button {
            position: fixed;
            top: 20px;
            left: 20px;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.12);
            color: white;
            padding: 8px 14px;
            border-radius: 50px;
            cursor: pointer;
            text-decoration: none;
            font-size: 14px;
            transition: all 0.2s ease;
            z-index: 10;
        }
        .back-button:hover {
            background: rgba(255, 255, 255, 0.12);
            transform: translateX(-2px);
        }
    </style>
</head>

<body>

<!-- PARTICLES -->
<div id="particleContainer" class="particles"></div>

<!-- BACK BUTTON -->
<a href="index.html" class="back-button">← Back to Home</a>

<!-- LOGIN SECTION -->
<section class="min-h-screen flex items-center justify-center relative px-4">
    <div class="auth-card glass">
        <button class="auth-close" onclick="window.location.href='index.html'">✕</button>
        <h2 id="authTitle">Login</h2>
        <p id="authSubtitle">Sign in to start your VibeBooth session.</p>

        <div class="mt-6">
            <input id="authEmail" type="email" class="auth-input" placeholder="Email address" autocomplete="email">
            <input id="authPassword" type="password" class="auth-input" placeholder="Password" autocomplete="current-password">
        </div>

        <button id="authSubmitBtn" class="auth-cta">Continue</button>

        <p class="text-sm text-gray-400 text-center mt-4">
            <span id="authSwitchText">Don't have an account?</span>
            <button id="authSwitchBtn" type="button" class="text-cyan-300 underline"></button>
        </p>
    </div>
</section>

<script src="storage.js"></script>
<script src="auth.js"></script>

</body>
</html>
